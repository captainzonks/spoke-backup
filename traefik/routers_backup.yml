# ==============================================================================
# BACKUP MODULE - TRAEFIK ROUTERS
# ==============================================================================
# Description: HTTP routing rules for the Kopia backup web UI
# Author: Matt Barham
# Created: 2026-04-28
# Modified: 2026-05-08
# Version: 1.0.1
# Host: Your Server
# ==============================================================================
# Type: Traefik Dynamic Config (routers)
# Component: module: backup
# Deployed by Spoke as: mod_backup_routers_backup.yml
# Dependencies:
#   - mod_backup_services_backup.yml (service definitions)
#   - hub middlewares (chain-no-auth) — Kopia handles its own basic auth
#   - Environment variables: DOMAIN, KOPIA_SUBDOMAIN
# ==============================================================================

http:
  routers:
    #======================================================
    #====================== KOPIA UI =====================
    #======================================================

    kopia:
      rule: Host(`${KOPIA_SUBDOMAIN}.{{ env "DOMAIN" }}`)
      entryPoints: "websecure"
      priority: 100
      middlewares: chain-no-auth@file
      service: kopia-svc@file
      tls: {}
